<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>機場禁區通行證 - 像素風機場挑戰賽</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f0f2f5;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none; 
            overflow: hidden; 
            overscroll-behavior: none; 
        }

        #game-wrapper {
            position: relative;
            width: 800px;
            height: 560px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: none; 
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 460px; 
            background: linear-gradient(to bottom, #111e38 0%, #204065 40%, #e67e22 80%, #f39c12 100%); 
            border: 4px solid #333;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        /* 🌆 香港國際機場建築物與控制塔剪影 */
        #airport-skyline {
            position: absolute;
            bottom: 40px; 
            left: 0;
            width: 100%;
            height: 120px; 
            background-image: 
                url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 50' fill='%23111e38'><path d='M10,25 Q30,20 60,23 L85,10 L88,12 L75,25 L92,26 L95,22 L98,22 L96,28 L98,34 L95,34 L92,30 L75,31 L88,44 L85,46 L60,33 Q30,32 10,25 Z'/></svg>"),
                url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 120' fill='%231a2a44'><rect x='50' y='80' width='120' height='40'/><polygon points='90,80 100,20 120,20 130,80'/><rect x='95' y='25' width='20' height='15' fill='%232c3e50'/><rect x='250' y='90' width='300' height='30'/><path d='M250,90 Q400,60 550,90 Z'/><rect x='600' y='75' width='80' height='45'/></svg>");
            
            background-position: right 40px bottom 10px, bottom center;
            background-repeat: no-repeat, repeat-x;
            background-size: 75px 38px, 800px 120px; 
            opacity: 0.9;
            pointer-events: none;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            color: #fff; 
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }

        #question-box {
            position: absolute;
            top: 50px; 
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 18px; 
            font-weight: bold;
            border: 3px solid #0056b3;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            color: #222;
            z-index: 10;
        }

        #ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: #444; 
            border-top: 5px solid #666; 
            box-sizing: border-box;
        }
        
        #ground::after {
            content: "";
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            height: 4px;
            background: repeating-linear-gradient(90deg, #f1c40f, #f1c40f 40px, transparent 40px, transparent 80px);
        }

        /* 🧑‍✈️ 像素風機場職員 */
        #player {
            position: absolute;
            width: 44px;  
            height: 64px; 
            z-index: 5;
            
            --size-scale: 1.0;
            --dir-scale: 1;
            transform: scale(calc(var(--size-scale) * var(--dir-scale)), var(--size-scale));
            transform-origin: bottom center; 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            
            background: 
                linear-gradient(to right, #000 0%, #000 100%) 24px 20px / 4px 4px,
                linear-gradient(to right, #000 0%, #000 100%) 36px 20px / 4px 4px,
                linear-gradient(to right, #f1c40f 0%, #f1c40f 100%) 28px 4px / 8px 4px,
                linear-gradient(to right, #f39c12 0%, #f39c12 100%) 16px 0px / 32px 4px,
                linear-gradient(to right, #f1c40f 0%, #f1c40f 100%) 12px 4px / 40px 4px,
                linear-gradient(to right, #222 0%, #222 100%) 8px 8px / 44px 4px,
                linear-gradient(to right, #ffdbac 0%, #ffdbac 100%) 16px 12px / 32px 16px,
                linear-gradient(to right, #ffdbac 0%, #ffdbac 100%) 24px 28px / 16px 4px,
                linear-gradient(to right, #c0392b 0%, #c0392b 100%) 30px 32px / 4px 12px, 
                linear-gradient(to right, #2980b9 0%, #2980b9 100%) 12px 32px / 40px 24px, 
                linear-gradient(to right, #ffdbac 0%, #ffdbac 100%) 4px 40px / 8px 8px,
                linear-gradient(to right, #ffdbac 0%, #ffdbac 100%) 52px 4px / 8px 8px, 
                linear-gradient(to right, #34495e 0%, #34495e 100%) 16px 56px / 12px 4px, 
                linear-gradient(to right, #34495e 0%, #34495e 100%) 36px 56px / 12px 4px, 
                linear-gradient(to right, #111 0%, #111 100%) 12px 60px / 16px 4px,
                linear-gradient(to right, #111 0%, #111 100%) 36px 60px / 16px 4px;
            background-repeat: no-repeat;
        }

        @keyframes correct-flash {
            0% { filter: drop-shadow(0 0 12px #2ecc71) brightness(1.3); }
            100% { filter: none; }
        }
        @keyframes wrong-flash {
            0% { filter: drop-shadow(0 0 12px #e74c3c) brightness(0.8); }
            100% { filter: none; }
        }
        .ans-correct { animation: correct-flash 0.4s ease forwards; }
        .ans-wrong { animation: wrong-flash 0.4s ease forwards; }

        .block {
            position: absolute;
            width: 80px;
            height: 50px;
            border-radius: 8px;
            border: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            box-shadow: 0 6px 0 #222;
            z-index: 5;
        }
        .block-green { background: #2ecc71; top: 190px; left: 250px; } 
        .block-red { background: #e74c3c; top: 190px; left: 470px; }

        @keyframes bump {
            0% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0); }
        }
        .bumped { animation: bump 0.15s ease; }

        .star-effect {
            position: absolute;
            font-size: 36px;
            color: #f1c40f; 
            text-shadow: 0 0 10px rgba(241, 196, 15, 1), 0 0 2px #000;
            pointer-events: none;
            z-index: 6;
            animation: floatUpStar 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes floatUpStar {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
            30% { opacity: 1; transform: translate(-50%, -60px) scale(1.4); }
            100% { transform: translate(-50%, -130px) scale(1); opacity: 0; }
        }

        /* ⚡ 核心改進：連擊 (Combo) 華麗浮動特效動畫 */
        .combo-effect {
            position: absolute;
            font-family: 'Arial Black', Impact, sans-serif;
            font-weight: 900;
            font-size: 32px;
            color: #f1c40f;
            text-shadow: 2px 2px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000, 0px 0px 12px rgba(241,196,15,0.8);
            pointer-events: none;
            z-index: 20;
            white-space: nowrap;
            animation: comboFloat 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.5) forwards;
        }
        
        /* Perfect 特效要更炫目奪眼 */
        .combo-perfect {
            font-size: 42px;
            color: #ff3366;
            text-shadow: 3px 3px 0px #000, -3px -3px 0px #000, 3px -3px 0px #000, -3px 3px 0px #000, 0px 0px 20px #ff3366;
            animation: perfectFloat 1.0s cubic-bezier(0.175, 0.885, 0.32, 1.6) forwards;
        }

        @keyframes comboFloat {
            0% { transform: translate(-50%, 0) scale(0.3); opacity: 0; }
            20% { transform: translate(-50%, -40px) scale(1.3); opacity: 1; }
            35% { transform: translate(-50%, -35px) scale(1.0); }
            100% { transform: translate(-50%, -90px) scale(0.8); opacity: 0; }
        }

        @keyframes perfectFloat {
            0% { transform: translate(-50%, 0) scale(0.2) rotate(-15deg); opacity: 0; }
            25% { transform: translate(-50%, -50px) scale(1.5) rotate(10deg); opacity: 1; }
            50% { transform: translate(-50%, -45px) scale(1.2) rotate(-5deg); }
            100% { transform: translate(-50%, -110px) scale(0.9) rotate(0deg); opacity: 0; }
        }

        /* 📱 虛擬按鈕樣式 */
        #touch-controls {
            width: 100%;
            height: 90px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            padding: 0 15px;
        }

        .control-group { display: flex; gap: 20px; }

        .touch-btn {
            width: 75px;
            height: 75px;
            background: #2c3e50;
            border: 3px solid #fff;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 5px 0 #1a252f;
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }

        .touch-btn:active {
            background: #f1c40f;
            color: #111;
            transform: translateY(3px);
            box-shadow: 0 2px 0 #1a252f;
        }
        
        #btn-jump {
            background: #e67e22;
            border-radius: 22px; 
            width: 95px;
            box-shadow: 0 5px 0 #d35400;
        }
        #btn-jump:active { 
            background: #d35400; 
            color: #fff;
            box-shadow: 0 2px 0 #a04000;
        }

        #screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(17, 30, 56, 0.9); 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #start-btn {
            padding: 12px 35px;
            font-size: 22px;
            background: #f1c40f; 
            color: #111;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 25px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(241, 196, 15, 0.4);
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="game-container">
            <div id="airport-skyline"></div>

            <div id="ui-layer">
                <div id="score-display">得分: 0</div>
                <div id="progress-display">題目: 1 / 5</div>
            </div>

            <div id="question-box">準備開始遊戲...</div>

            <div id="block-green" class="block block-green">⭕</div>
            <div id="block-red" class="block block-red">❌</div>

            <div id="player"></div>
            <div id="ground"></div>

            <div id="screen-overlay">
                <h1 id="overlay-title">✈️ 香港國際機場<br>禁區通行證問答挑戰賽</h1>
                <p id="overlay-desc" style="max-width: 500px; line-height: 1.6; font-size: 15px;">
                    歡迎來到香港國際機場！<br>
                    電腦端：請使用 <b>左右方向鍵</b> 移動，<b>上鍵或空白鍵</b> 跳躍。<br>
                    手機/iPad：請使用 <b>下方虛擬鍵</b> 進行操作回答！
                </p>
                <button id="start-btn" onclick="startGame()">建立登機證 開始</button>
            </div>
        </div>

        <div id="touch-controls">
            <div class="control-group">
                <div id="btn-left" class="touch-btn">◀</div>
                <div id="btn-right" class="touch-btn">▶</div>
            </div>
            <div id="btn-jump" class="touch-btn">▲ 跳</div>
        </div>
    </div>

<script>
    const questionBank = [
        { q: "通行證有效期屆滿了，我可以嘗試進入機場禁區嗎？", a: "❌" },
        { q: "如果我的通行證上沒有「B」字批註，我可以進入行李處理大堂嗎？", a: "❌" },
        { q: "當我自己離港旅遊時，可以使用通行證通過職員通道嗎？", a: "❌" },
        { q: "我可以將我的通行證借給相熟的同事或朋友使用嗎？", a: "❌" },
        { q: "當通行證損壞或不再受僱於該機構時，必須立刻交還嗎？", a: "⭕" },
        { q: "如果我不小心把報失的通行證找回來了，可以直接拿來重新使用嗎？", a: "❌" },
        { q: "我可以企圖進入我未獲批准進入的機場禁區分區嗎？", a: "❌" },
        { q: "若違反通行證簽發條件，除了可能被取消通行證，還可能被檢控嗎？", a: "⭕" },
        { q: "我可以私自塗改、更改、干擾或處置我本人的通行證嗎？", a: "❌" },
        { q: "為了防止遺失，持證人必須採取適當措施妥善保管通行證嗎？", a: "⭕" }
    ];

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let gameActive = false;
    let isColliding = false; 
    let playerScale = 1.0; 
    let comboCount = 0; // ⚡ 用來追蹤目前連續答對的次數

    const containerWidth = 800;
    const containerHeight = 460;
    const groundY = 40; 
    const playerWidth = 44;  
    const playerHeight = 64; 
    
    let playerX = 378;
    let playerY = groundY; 
    let velocityX = 0;
    let velocityY = 0;
    let isJumping = false;
    const gravity = 0.6;
    const jumpForce = 13.5; 
    const speed = 6;    

    const keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, Space: false };

    const gameContainer = document.getElementById('game-container');
    const gameWrapper = document.getElementById('game-wrapper');
    const playerEl = document.getElementById('player');
    const qBox = document.getElementById('question-box');
    const scoreEl = document.getElementById('score-display');
    const progressEl = document.getElementById('progress-display');
    const overlay = document.getElementById('screen-overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayDesc = document.getElementById('overlay-desc');
    const startBtn = document.getElementById('start-btn');
    const blockGreen = document.getElementById('block-green');
    const blockRed = document.getElementById('block-red');

    // 1. 🖥️ 鍵盤事件
    window.addEventListener('keydown', (e) => {
        if (e.code in keys || e.key === ' ') {
            if(e.code === 'Space') keys['Space'] = true;
            else keys[e.key] = true;
            if(e.code === 'Space' || e.key === 'ArrowUp') e.preventDefault();
        }
    });
    window.addEventListener('keyup', (e) => {
        if (e.code in keys || e.key === ' ') {
            if(e.code === 'Space') keys['Space'] = false;
            else keys[e.key] = false;
        }
    });

    // 2. 📱 觸控事件
    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');
    const btnJump = document.getElementById('btn-jump');

    [btnLeft, btnRight, btnJump].forEach(btn => {
        btn.addEventListener('contextmenu', e => e.preventDefault());
    });

    btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowLeft'] = true; });
    btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowRight'] = true; });
    btnJump.addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowUp'] = true; });

    btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); keys['ArrowLeft'] = false; });
    btnLeft.addEventListener('touchcancel', (e) => { keys['ArrowLeft'] = false; });

    btnRight.addEventListener('touchend', (e) => { e.preventDefault(); keys['ArrowRight'] = false; });
    btnRight.addEventListener('touchcancel', (e) => { keys['ArrowRight'] = false; });

    btnJump.addEventListener('touchend', (e) => { e.preventDefault(); keys['ArrowUp'] = false; });
    btnJump.addEventListener('touchcancel', (e) => { keys['ArrowUp'] = false; });

    window.addEventListener('touchend', (e) => {
        if (e.touches.length === 0) {
            keys['ArrowLeft'] = false;
            keys['ArrowRight'] = false;
            keys['ArrowUp'] = false;
        }
    });

    // 3. 📐 RWD 縮放
    function resizeGame() {
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
        const baseWidth = 800;
        const baseHeight = 560;
        
        let scale = Math.min((windowWidth * 0.96) / baseWidth, (windowHeight * 0.96) / baseHeight);
        if (scale > 1) scale = 1;
        
        gameWrapper.style.transform = `scale(${scale})`;
        gameWrapper.style.transformOrigin = 'center center';
    }

    window.addEventListener('resize', resizeGame);
    resizeGame();
    setTimeout(resizeGame, 200);

    function getRandomQuestions(bank, count) {
        let shuffled = [...bank].sort(() => Math.random() - 0.5);
        return shuffled.slice(0, count);
    }

    function startGame() {
        overlay.style.display = 'none';
        score = 0;
        currentQuestionIndex = 0;
        comboCount = 0; // 重置連擊
        playerX = 378;
        playerY = groundY;
        velocityY = 0;
        isJumping = false;
        isColliding = false; 
        
        playerScale = 1.0;
        playerEl.style.setProperty('--size-scale', '1.0');
        playerEl.style.setProperty('--dir-scale', '1');
        playerEl.className = ""; 
        
        Object.keys(keys).forEach(k => keys[k] = false);
        
        currentQuestions = getRandomQuestions(questionBank, 5);
        updateUI();
        gameActive = true;
    }

    function updateUI() {
        scoreEl.innerText = `得分: ${score}`;
        progressEl.innerText = `題目: ${currentQuestionIndex + 1} / 5`;
        qBox.innerText = currentQuestions[currentQuestionIndex].q;
    }

    function createStarEffect(leftPosition, topPosition) {
        const star = document.createElement('div');
        star.className = 'star-effect';
        star.innerText = '⭐';
        star.style.left = (leftPosition + 40) + 'px'; 
        star.style.top = topPosition + 'px';
        gameContainer.appendChild(star);
        setTimeout(() => star.remove(), 600);
    }

    // ⚡ 產生連擊浮動文字特效
    function createComboEffect(text, leftPosition, topPosition, isPerfect) {
        const combo = document.createElement('div');
        combo.className = isPerfect ? 'combo-effect combo-perfect' : 'combo-effect';
        combo.innerText = text;
        combo.style.left = (leftPosition + 40) + 'px';
        combo.style.top = (topPosition - 20) + 'px'; // 稍微在磚塊上方一點爆發
        gameContainer.appendChild(combo);
        setTimeout(() => combo.remove(), 1000);
    }

    function checkBlockCollision() {
        if (isColliding) return;

        let playerTopAbs = containerHeight - playerY - playerHeight;
        
        if (velocityY > 0 && playerTopAbs <= 240 && playerTopAbs >= 210) {
            if (playerX + playerWidth > 250 && playerX < 330) {
                triggerAnswer("⭕", blockGreen, 250, 190);
            }
            else if (playerX + playerWidth > 470 && playerX < 550) {
                triggerAnswer("❌", blockRed, 470, 190);
            }
        }
    }

    function triggerAnswer(chosenAnswer, blockEl, blockLeft, blockTop) {
        isColliding = true; 
        velocityY = -4; 
        
        blockEl.classList.add('bumped');
        setTimeout(() => blockEl.classList.remove('bumped'), 150);

        playerEl.classList.remove('ans-correct', 'ans-wrong');
        void playerEl.offsetWidth; 

        const correctAnswer = currentQuestions[currentQuestionIndex].a;
        if (chosenAnswer === correctAnswer) {
            score += 20;
            comboCount++; // 連擊數增加！
            
            playerEl.classList.add('ans-correct');
            createStarEffect(blockLeft, blockTop);
            
            // 判斷連擊層級顯示對應文字特效
            if (comboCount === 5) {
                createComboEffect("🎉 PERFECT!!", blockLeft, blockTop, true);
            } else if (comboCount > 1) {
                createComboEffect(`🔥 X${comboCount}`, blockLeft, blockTop, false);
            }

            playerScale = 1.35; // 答對放大
        } else {
            comboCount = 0; // 答錯！連擊歸零
            playerEl.classList.add('ans-wrong');
            playerScale = 0.7;  // 答錯縮小
        }

        playerEl.style.setProperty('--size-scale', playerScale);
        currentQuestionIndex++;
    }

    function endGame() {
        gameActive = false;
        overlay.style.display = 'flex';
        overlayTitle.innerText = "🎉 挑戰完成！";
        overlayDesc.innerHTML = `你的最終得分是：<strong style='font-size:24px; color:#f1c40f;'>${score} 分</strong> / 100 分<br><br>${score === 100 ? '🔥 完美表現！你達成了全對 Perfect 紀錄！對機場禁區通行證守則瞭如指掌！' : '安全至上！請重新温習機場禁區守則，確保機場運作安全！'}`;
        startBtn.innerText = "重新挑戰";
        
        Object.keys(keys).forEach(k => keys[k] = false);
        isColliding = false;
    }

    function update() {
        if (gameActive) {
            if (keys.ArrowLeft) {
                velocityX = -speed;
                playerEl.style.setProperty('--dir-scale', '-1'); 
            } else if (keys.ArrowRight) {
                velocityX = speed;
                playerEl.style.setProperty('--dir-scale', '1');  
            } else {
                velocityX = 0;
            }

            if ((keys.ArrowUp || keys.Space) && !isJumping) {
                velocityY = jumpForce;
                isJumping = true;
            }

            playerY += velocityY;
            if (isJumping) {
                velocityY -= gravity;
            }

            if (playerY <= groundY) {
                playerY = groundY;
                velocityY = 0;
                isJumping = false;
                
                if (isColliding) {
                    if (currentQuestionIndex < 5) {
                        updateUI();       
                        playerX = 378; 
                        isColliding = false; 
                    } else {
                        endGame();
                    }
                }
            }

            playerX += velocityX;
            if (playerX < 0) playerX = 0;
            if (playerX > containerWidth - playerWidth) playerX = containerWidth - playerWidth;

            checkBlockCollision();

            playerEl.style.left = playerX + 'px';
            playerEl.style.bottom = playerY + 'px';
        }

        requestAnimationFrame(update);
    }

    update();
</script>

</body>
</html>
